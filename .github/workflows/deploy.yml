name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    uses: ajnacloud-ksj/ajna-github-workflows/.github/workflows/reusable-docker-ecr.yml@main
    with:
      aws-region: ap-south-1
      ecr-repository: ibex-db-lambda
      role-to-assume: arn:aws:iam::808527335982:role/GitHubActions-Deploy-Role
      image-tag: ${{ github.sha }}
      platform: linux/arm64
      # Note: To update ENGINE_VERSION, add build-args support to reusable workflow
      # or pass ENGINE_VERSION directly in docker build command (currently v0.2.0 via Dockerfile ARG default)

  deploy-lambda:
    needs: build-and-push
    uses: ajnacloud-ksj/ajna-github-workflows/.github/workflows/reusable-lambda-deploy.yml@main
    with:
      aws-region: ap-south-1
      lambda-function-name: ibex-db-lambda
      image-uri: ${{ needs.build-and-push.outputs.image-uri }}
      role-to-assume: arn:aws:iam::808527335982:role/GitHubActions-Deploy-Role
      environment-variables: "ENVIRONMENT=production,BUCKET_NAME=ajna-ibex-db-warehouse--aps1-az1--x-s3,UPLOAD_BUCKET_NAME=ajna-ibex-db-warehouse,AWS_ACCOUNT_ID=808527335982,IBEX_AUTH_ENABLED=${{ vars.IBEX_AUTH_ENABLED || 'false' }},IBEX_LEGACY_API_KEY=${{ secrets.IBEX_LEGACY_API_KEY }},IBEX_NW_API_KEY=${{ secrets.IBEX_NW_API_KEY }},IBEX_GB_API_KEY=${{ secrets.IBEX_GB_API_KEY }},IBEX_AE_API_KEY=${{ secrets.IBEX_AE_API_KEY }},IBEX_AE_QUERY_KEY=${{ secrets.IBEX_AE_QUERY_KEY }}"
